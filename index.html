            text-align: center;

        input:focus {

            outline: none;
            box-shadow: 0 10px 20px rgba(27,94,32,0.1);

            color: white;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-check:hover {
            background: #123e15;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #resultContainer {
            display: none;
            padding: 0 30px 40px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .student-card {
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            padding: 25px;
            background: #fff;
            position: relative;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }

        .lulus-tag { background: #e8f5e9; color: #2e7d32; border: 1px solid #2e7d32; }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #eee;
            font-size: 0.9rem;
        }

        .data-label { color: #888; text-align: left; }
        .data-value { font-weight: 600; color: var(--dark); text-align: right; }

        .download-box {
            margin-top: 25px;
            text-align: center;
        }

        .btn-download {
            display: block;
            background: var(--gold);
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
        }

        .note-admin {
            background: #fff9c4;

            border-radius: 12px;
            font-size: 0.8rem;
            color: #827717;
            text-align: left;
            margin-top: 20px;
            line-height: 1.5;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.75rem;
            color: #999;
            background: #fafafa;
        }
        /* --- ANIMASI LOADING --- */
.loader {
    border: 5px solid #f3f3f3; /* Warna abu-abu muda untuk lingkaran dasar */
    border-top: 5px solid var(--primary); /* Warna hijau (sesuai tema) untuk bagian yang berputar */
    border-radius: 50%;
    width: 45px;
    height: 45px;
    animation: spin 1s linear infinite; /* Menjalankan animasi 'spin' terus menerus */
    margin: 25px auto;
    display: none; /* Kita sembunyikan dulu, baru muncul saat tombol diklik */
}

/* Instruksi cara berputarnya */
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Efek muncul halus untuk hasil pencarian */
.fade-in-result {
    animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

    };

    function prosesCek() {
    const nisn = document.getElementById('nisnInput').value;
    const container = document.getElementById('resultContainer');
    const loader = document.getElementById('loader');
    
    if(!nisn) { 
        alert("Silakan masukkan NISN!"); 
        return; 
    }

    // 1. Sembunyikan hasil lama dan tampilkan animasi loading
    container.style.display = "none";
    loader.style.display = "block";

    // 2. Tunggu 1,5 detik (biar kelihatan mikir)
    setTimeout(() => {
        loader.style.display = "none"; // Matikan animasi loading
        
        const data = database[nisn];
        if(data) {
            container.style.display = "block";
            container.classList.add('fade-in-result'); // Muncul pelan-pelan
            
            let html = `
                <div class="student-card">
                    <div class="status-badge lulus-tag">STATUS: LULUS</div>
                    <div class="data-row"><span class="data-label">Nama Lengkap</span><span class="data-value">${data.nama}</span></div>
                    <div class="data-row"><span class="data-label">NISN</span><span class="data-value">${nisn}</span></div>
                    <div class="data-row"><span class="data-label">Tempat Lahir</span><span class="data-value">${data.tempat}</span></div>
                    <div class="data-row"><span class="data-label">Tanggal Lahir</span><span class="data-value">${data.tanggal}</span></div>
                    <div class="data-row"><span class="data-label">Rombel</span><span class="data-value">${data.kelas}</span></div>
            `;

            if(data.status === "LUNAS") {
                html += `
                    <div class="download-box">
                        <p style="font-size:0.8rem; color:green; margin-bottom:10px;">Selamat! Syarat administrasi terpenuhi.</p>
                        <a href="${data.file}" class="btn-download" target="_blank">UNDUH SKL DIGITAL (PDF)</a>
                    </div>
                `;
            } else {
                html += `
                    <div class="note-admin">
                        <b>Informasi Pengunduhan:</b><br>
                        Selamat atas kelulusannya! Untuk mengunduh SKL Digital, mohon selesaikan kewajiban administratif berikut:<br>
                        <span style="color:#d32f2f; font-weight:700;">- ${data.tagihan}</span><br><br>
                        Jika sudah melakukan pembayaran, silakan konfirmasi ke bagian keuangan.
                    </div>
                    <a href="https://wa.me/6285378439343?text=Halo%20Admin%2C%20saya%20ingin%20konfirmasi%20pembayaran%20atas%20nama%20${data.nama}" target="_blank" style="display:block; text-align:center; margin-top:15px; color:var(--primary); font-size:0.8rem; font-weight:700; text-decoration:none;">
                        📩 KONFIRMASI PEMBAYARAN (WA)
                    </a>
                `;
            }
            html += `</div>`;
            container.innerHTML = html;
        } else {
            alert("Data NISN tidak ditemukan. Pastikan nomor benar.");
        }
    }, 1500); // Angka 1500 = 1,5 detik. Bisa kamu ganti kalau mau lebih cepat/lambat.
}
