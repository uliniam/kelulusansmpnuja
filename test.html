        .main-card { width: 100%; max-width: 500px; background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1); margin: 20px; }
        .header-brand { background: var(--primary); padding: 30px 20px; text-align: center; color: white; border-bottom: 5px solid var(--gold); }
        .logo-box { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .logo-box img { height: 60px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2)); }
        .header-brand h1 { font-family: 'Montserrat', sans-serif; font-size: 1.2rem; margin: 0; letter-spacing: 1px; }
        .search-area { padding: 30px; text-align: center; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 1rem; text-align: center; box-sizing: border-box; transition: 0.3s; font-weight: 600; margin-bottom: 15px; }
        input:focus { border-color: var(--primary); outline: none; }
        .btn-check { width: 100%; background: var(--primary); color: white; padding: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-check:hover { background: #123e15; transform: translateY(-2px); }
        
        /* CSS ANIMASI LOADING */
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in-result { animation: fadeIn 0.8s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .student-card { border: 1px solid #e0e0e0; border-radius: 15px; padding: 20px; background: #fff; text-align: left; }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 50px; font-weight: 800; font-size: 0.7rem; margin-bottom: 15px; background: #e8f5e9; color: #2e7d32; border: 1px solid #2e7d32; }
        .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 0.85rem; }
        .data-label { color: #888; }
        .data-value { font-weight: 600; color: var(--dark); }
        .btn-download { display: block; background: var(--gold); color: white; text-decoration: none; padding: 12px; border-radius: 10px; font-weight: 700; text-align: center; margin-top: 20px; }
        .note-admin { background: #fff9c4; padding: 12px; border-radius: 10px; font-size: 0.75rem; color: #827717; margin-top: 15px; }
    </style>
</head>

    function prosesCek() {
        const nisn = document.getElementById('nisnInput').value;
        const container = document.getElementById('resultContainer');
        const loader = document.getElementById('loader');
        
        if(!nisn) { alert("Silakan masukkan NISN!"); return; }

        container.style.display = "none";
        loader.style.display = "block";

        setTimeout(() => {
            loader.style.display = "none";
            const data = database[nisn];
            if(data) {
                container.style.display = "block";
                container.classList.add('fade-in-result');
                
                let html = `
                    <div class="student-card">
                        <div class="status-badge">STATUS: LULUS</div>
                        <div class="data-row"><span class="data-label">Nama</span><span class="data-value">${data.nama}</span></div>
                        <div class="data-row"><span class="data-label">NISN</span><span class="data-value">${nisn}</span></div>
                        <div class="data-row"><span class="data-label">Lahir</span><span class="data-value">${data.tempat}, ${data.tanggal}</span></div>
                        <div class="data-row"><span class="data-label">Kelas</span><span class="data-value">${data.kelas}</span></div>
                `;

                if(data.status === "LUNAS") {
                    html += `<a href="${data.file}" class="btn-download" target="_blank">UNDUH SKL DIGITAL</a>`;
                } else {
                    html += `
                        <div class="note-admin">
                            <b>Administrasi Belum Lengkap:</b><br>
                            Kewajiban: <span style="color:#d32f2f;">${data.tagihan}</span><br>
                            Mohon konfirmasi ke Bendahara Sekolah.
                        </div>
                    `;
                }
                html += `</div>`;
                container.innerHTML = html;
            } else {
                alert("NISN tidak ditemukan!");
            }
        }, 1500);
    }
</script>
