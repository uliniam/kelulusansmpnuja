<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKL ONLINE - SMP NURUL JADID</title>
    <link rel="icon" type="image/png" href="LOGO NJ png.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #1b5e20; 
            --gold: #d4af37; 
            --dark: #2c3e50; 
            --light-bg: #f4f7f6; 
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            /* Background Gradasi Hijau Mewah */
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .main-card { 
            width: 100%; 
            max-width: 500px; 
            background: white; 
            border-radius: 30px; 
            overflow: hidden; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.3); 
            margin: 20px; 
        }

        .header-brand { 
            background: white; 
            padding: 35px 20px; 
            text-align: center; 
            border-bottom: 5px solid var(--gold); 
        }

        .logo-box { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-bottom: 15px; 
        }

        .logo-box img { 
            height: 75px; 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); 
        }

        .header-brand h1 { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 1.4rem; 
            margin: 0; 
            color: var(--primary);
            letter-spacing: 1px; 
            text-transform: uppercase;
        }

        .header-brand p {
            margin: 5px 0 0;
            font-size: 0.8rem;
            color: #666;
            font-weight: 600;
        }

        .search-area { 
            padding: 40px 30px; 
            text-align: center; 
            background: #fff;
        }

        .instruction {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        input { 
            width: 100%; 
            padding: 18px; 
            border: 2px solid #e0e0e0; 
            border-radius: 15px; 
            font-size: 1.1rem; 
            text-align: center; 
            box-sizing: border-box; 
            transition: 0.3s; 
            font-weight: 700; 
            margin-bottom: 20px; 
            color: var(--primary);
        }

        input:focus { 
            border-color: var(--primary); 
            outline: none; 
            box-shadow: 0 0 15px rgba(27,94,32,0.1);
        }

        .btn-check { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            padding: 18px; 
            border: none; 
            border-radius: 15px; 
            font-weight: 700; 
            font-size: 1rem;
            cursor: pointer; 
            transition: 0.3s; 
            box-shadow: 0 10px 20px rgba(27,94,32,0.2);
        }

        .btn-check:hover { 
            background: #123e15; 
            transform: translateY(-3px); 
            box-shadow: 0 15px 25px rgba(27,94,32,0.3);
        }
        
        /* CSS ANIMASI LOADING */
        .loader { 
            border: 5px solid #f3f3f3; 
            border-top: 5px solid var(--primary); 
            border-radius: 50%; 
            width: 45px; 
            height: 45px; 
            animation: spin 1s linear infinite; 
            margin: 30px auto; 
            display: none; 
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .fade-in-result { animation: fadeIn 0.8s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .student-card { 
            border: 1px solid #eee; 
            border-radius: 20px; 
            padding: 25px; 
            background: #fafafa; 
            text-align: left; 
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
        }

        .status-badge { 
            display: inline-block; 
            padding: 7px 20px; 
            border-radius: 50px; 
            font-weight: 800; 
            font-size: 0.75rem; 
            margin-bottom: 20px; 
            background: #e8f5e9; 
            color: #2e7d32; 
            border: 1px solid #2e7d32; 
        }

        .data-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 0; 
            border-bottom: 1px dashed #ddd; 
            font-size: 0.9rem; 
        }

        .data-label { color: #777; }
        .data-value { font-weight: 700; color: var(--dark); text-align: right; }

        .btn-download { 
            display: block; 
            background: var(--gold); 
            color: white; 
            text-decoration: none; 
            padding: 18px; 
            border-radius: 12px; 
            font-weight: 800; 
            text-align: center; 
            margin-top: 25px; 
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-download:hover { background: #b8952d; transform: scale(1.02); }

        .note-admin { 
            background: #fff9c4; 
            padding: 15px; 
            border-radius: 12px; 
            font-size: 0.8rem; 
            color: #827717; 
            margin-top: 20px; 
            border-left: 5px solid #fbc02d;
            line-height: 1.6;
        }

        footer {
            padding: 20px;
            text-align: center;
            font-size: 0.7rem;
            color: #999;
            background: #fff;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header-brand">
        <div class="logo-box">
            <img src="LOGO NJ png.png" alt="Logo NJ">
            <img src="png logo smp.png" alt="Logo SMP">
        </div>
        <h1>Kelulusan Santri</h1>
        <p>SMP SWASTA NURUL JADID • TA 2025/2026</p>
    </div>

    <div class="search-area">
        <p class="instruction">Silakan masukkan <b>NISN (10 Digit)</b> santri untuk melihat hasil kelulusan dan mengunduh SKL.</p>
        
        <input type="text" id="nisnInput" placeholder="Contoh: 0112345678" maxlength="10">
        
        <button class="btn-check" onclick="prosesCek()">PERIKSA DATA</button>
        
        <div id="loader" class="loader"></div>
        
        <div id="resultContainer" style="display:none; margin-top: 25px;"></div>
    </div>

    <footer>
        &copy; 2026 IT Center SMP Nurul Jadid<br>Singkut, Sarolangun, Jambi
    </footer>
</div>

<script>
    // DATABASE TERUPDATE DARI GOOGLE SHEETS
    const database = {
        "0117130401": { nama: "ARLENA", tempat: "PENINJAUAN", tanggal: "2011-01-28", kelas: "9A", status: "LUNAS", tagihan: "", file: "#" },
        "0116310546": { nama: "AYU LESTARI", tempat: "KARYA MAKMUR", tanggal: "2011-06-13", kelas: "9A", status: "BELUM", tagihan: "Uang Makan Rp 500.000", file: "#" },
        "0117899995": { nama: "ASHFA RIHHADATUL CHUMAIROH", tempat: "BIUKU TANJUNG", tanggal: "2011-04-15", kelas: "9A", status: "LUNAS", tagihan: "", file: "#" },
        "0112422705": { nama: "CHASA APRILI QUEEN", tempat: "LESUNG BATU MUDA", tanggal: "2011-04-04", kelas: "9A", status: "LUNAS", tagihan: "", file: "#" },
        "0109965953": { nama: "DEWI AULIA", tempat: "LUBUK LINGGAU", tanggal: "2010-09-26", kelas: "9A", status: "LUNAS", tagihan: "", file: "#" },
        // ... (Data siswa lainnya otomatis masuk ke sini)
    };

    function prosesCek() {
        const nisn = document.getElementById('nisnInput').value;
        const container = document.getElementById('resultContainer');
        const loader = document.getElementById('loader');
        
        if(nisn.length < 5) { alert("Masukkan NISN yang benar!"); return; }

        // Reset tampilan
        container.style.display = "none";
        loader.style.display = "block";

        // Efek loading 1.5 detik
        setTimeout(() => {
            loader.style.display = "none";
            const data = database[nisn];
            
            if(data) {
                container.style.display = "block";
                container.classList.add('fade-in-result');
                
                let html = `
                    <div class="student-card">
                        <div class="status-badge">STATUS: LULUS</div>
                        <div class="data-row"><span class="data-label">Nama Lengkap</span><span class="data-value">${data.nama}</span></div>
                        <div class="data-row"><span class="data-label">NISN</span><span class="data-value">${nisn}</span></div>
                        <div class="data-row"><span class="data-label">TTL</span><span class="data-value">${data.tempat}, ${data.tanggal}</span></div>
                        <div class="data-row"><span class="data-label">Rombel</span><span class="data-value">${data.kelas}</span></div>
                `;

                if(data.status === "LUNAS") {
                    html += `
                        <div style="text-align:center">
                            <p style="color:green; font-size:0.8rem; margin-top:15px;">✓ Administrasi Lengkap</p>
                            <a href="${data.file}" class="btn-download" target="_blank">UNDUH SKL DIGITAL</a>
                        </div>`;
                } else {
                    html += `
                        <div class="note-admin">
                            <b>⚠ Syarat Unduh Belum Terpenuhi:</b><br>
                            Mohon selesaikan administrasi berikut:<br>
                            <span style="color:#d32f2f; font-weight:bold;">- ${data.tagihan}</span><br><br>
                            Silakan konfirmasi ke bagian keuangan jika sudah membayar.
                        </div>
                        <a href="https://wa.me/6285378439343" style="display:block; text-align:center; margin-top:15px; color:var(--primary); font-size:0.8rem; font-weight:bold; text-decoration:none;">
                            HUBUNGI BENDAHARA (WA)
                        </a>`;
                }
                html += `</div>`;
                container.innerHTML = html;
            } else {
                alert("Data NISN tidak ditemukan. Pastikan nomor benar!");
            }
        }, 1500);
    }
</script>
</body>
</html>
